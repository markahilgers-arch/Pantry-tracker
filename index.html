<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1a2e1a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pantry Tracker" />
<title>Pantry Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --green-900: #0d1f0d;
  --green-800: #1a2e1a;
  --green-700: #243d24;
  --green-600: #2d4d2d;
  --green-500: #3a6b3a;
  --green-400: #4d8c4d;
  --green-300: #72b872;
  --green-200: #a8d8a8;
  --green-100: #d4edd4;
  --green-50:  #eef7ee;
  --amber: #e8a030;
  --amber-light: #fef3d8;
  --red: #d64040;
  --red-light: #fde8e8;
  --cream: #f5f0e8;
  --text-on-dark: #e8f0e8;
  --text-muted-dark: #8aab8a;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-pill: 100px;
  --shadow: 0 4px 24px rgba(0,0,0,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--green-900);
  color: var(--text-on-dark);
  overscroll-behavior: none;
}

/* ── LAYOUT ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--green-800);
  padding: env(safe-area-inset-top, 16px) 20px 16px;
  padding-top: max(env(safe-area-inset-top, 16px), 16px);
  border-bottom: 1px solid var(--green-700);
  flex-shrink: 0;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.app-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  color: var(--green-100);
  letter-spacing: -0.5px;
}
.app-subtitle {
  font-size: 12px;
  color: var(--text-muted-dark);
  margin-top: 1px;
}
.header-icon-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  background: var(--green-700);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--green-200);
  font-size: 20px;
  transition: background 0.15s;
}
.header-icon-btn:active { background: var(--green-600); }

/* stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.stat-pill {
  background: var(--green-700);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  text-align: center;
}
.stat-val {
  font-size: 20px;
  font-weight: 600;
  color: var(--green-100);
  line-height: 1;
}
.stat-val.warn { color: var(--amber); }
.stat-lbl {
  font-size: 10px;
  color: var(--text-muted-dark);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--green-800);
  border-bottom: 1px solid var(--green-700);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 12px 8px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab.active {
  color: var(--green-200);
  border-bottom-color: var(--green-300);
}
.tab-icon { font-size: 18px; }

/* ── PAGES ── */
.pages { flex: 1; overflow: hidden; position: relative; }
.page {
  position: absolute; inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  display: none;
}
.page.active { display: block; }

/* ── SCAN PAGE ── */
.mode-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.mode-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--green-700);
  background: transparent;
  color: var(--text-muted-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
}
.mode-btn.active {
  border-color: var(--green-400);
  background: var(--green-700);
  color: var(--green-100);
}

.camera-card {
  background: var(--green-800);
  border: 1.5px dashed var(--green-600);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.camera-card.active { border-color: var(--green-400); border-style: solid; }
.camera-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 20px;
  gap: 10px;
}
.camera-placeholder svg { opacity: 0.4; }
.camera-placeholder p { font-size: 14px; color: var(--text-muted-dark); }
.camera-placeholder .hint { font-size: 11px; color: var(--green-500); }
#scanner-video {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  display: block;
}
.scan-overlay {
  position: relative;
}
.scan-line {
  position: absolute;
  left: 12%; right: 12%;
  height: 2px;
  background: var(--green-300);
  box-shadow: 0 0 8px var(--green-300);
  animation: sweep 2s ease-in-out infinite;
  border-radius: 1px;
}
@keyframes sweep {
  0%,100% { top: 20%; }
  50%      { top: 78%; }
}
.scan-corners {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.corner {
  position: absolute;
  width: 22px; height: 22px;
  border-color: var(--green-300);
  border-style: solid;
  opacity: 0.8;
}
.corner.tl { top: 10%; left: 12%; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.corner.tr { top: 10%; right: 12%; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.corner.bl { bottom: 10%; left: 12%; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.corner.br { bottom: 10%; right: 12%; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

.manual-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.barcode-input {
  flex: 1;
  background: var(--green-800);
  border: 1.5px solid var(--green-600);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text-on-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.15s;
}
.barcode-input:focus { border-color: var(--green-400); }
.barcode-input::placeholder { color: var(--green-500); }
.lookup-btn {
  background: var(--green-500);
  border: none;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.lookup-btn:active { background: var(--green-400); }

/* status message */
.status {
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 12px;
  display: none;
  animation: fadeIn 0.2s ease;
}
.status.show { display: block; }
.status.success { background: rgba(72,180,72,0.15); color: var(--green-200); border: 1px solid rgba(72,180,72,0.25); }
.status.error   { background: rgba(214,64,64,0.15); color: #f4a0a0; border: 1px solid rgba(214,64,64,0.25); }
.status.info    { background: rgba(77,140,77,0.15); color: var(--green-200); border: 1px solid var(--green-600); }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

/* product result card */
.product-card {
  background: var(--green-800);
  border: 1px solid var(--green-600);
  border-radius: var(--radius);
  padding: 16px;
  display: none;
  animation: fadeIn 0.2s ease;
}
.product-card.show { display: block; }
.product-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.product-img {
  width: 64px; height: 64px;
  border-radius: var(--radius-sm);
  object-fit: contain;
  background: var(--cream);
  border: 1px solid var(--green-600);
  flex-shrink: 0;
}
.product-img-ph {
  width: 64px; height: 64px;
  border-radius: var(--radius-sm);
  background: var(--green-700);
  border: 1px solid var(--green-600);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 28px;
}
.product-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--green-100);
  margin-bottom: 4px;
  line-height: 1.3;
}
.product-brand {
  font-size: 12px;
  color: var(--text-muted-dark);
  margin-bottom: 6px;
}
.product-barcode {
  font-size: 11px;
  color: var(--green-500);
  font-family: monospace;
}
.action-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.qty-box {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--green-700);
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--green-600);
}
.qty-step {
  width: 40px; height: 44px;
  background: none;
  border: none;
  color: var(--green-200);
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.qty-step:active { background: var(--green-600); }
.qty-val {
  width: 36px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--green-100);
  background: none;
  border: none;
  outline: none;
  -moz-appearance: textfield;
}
.qty-val::-webkit-inner-spin-button { display: none; }
.do-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.do-btn:active { opacity: 0.8; }
.do-btn.add    { background: var(--green-400); color: white; }
.do-btn.remove { background: var(--red); color: white; }

/* ── INVENTORY PAGE ── */
.inv-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.inv-search {
  flex: 1;
  background: var(--green-800);
  border: 1.5px solid var(--green-600);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text-on-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
}
.inv-search:focus { border-color: var(--green-400); }
.inv-search::placeholder { color: var(--green-500); }
.filter-wrap {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 2px;
}
.filter-wrap::-webkit-scrollbar { display: none; }
.fp {
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--green-600);
  background: transparent;
  color: var(--text-muted-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.fp.active { background: var(--green-600); color: var(--green-100); border-color: var(--green-500); }

.sort-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.sort-lbl { font-size: 12px; color: var(--text-muted-dark); }
.sort-sel {
  background: var(--green-800);
  border: 1px solid var(--green-600);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  color: var(--green-200);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

.inv-list { display: flex; flex-direction: column; gap: 8px; }

.inv-item {
  background: var(--green-800);
  border: 1px solid var(--green-700);
  border-radius: var(--radius-sm);
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  transition: border-color 0.15s;
  animation: fadeIn 0.2s ease;
}
.inv-item:active { border-color: var(--green-500); }
.inv-thumb {
  width: 46px; height: 46px;
  border-radius: 8px;
  object-fit: contain;
  background: var(--cream);
  flex-shrink: 0;
}
.inv-thumb-ph {
  width: 46px; height: 46px;
  border-radius: 8px;
  background: var(--green-700);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 22px;
}
.inv-body { flex: 1; min-width: 0; }
.inv-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--green-100);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.inv-meta {
  font-size: 11px;
  color: var(--text-muted-dark);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.inv-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}
.qty-badge {
  background: var(--green-700);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 16px;
  font-weight: 600;
  color: var(--green-100);
  display: flex;
  align-items: center;
  gap: 6px;
}
.qty-badge.low { background: rgba(232,160,48,0.2); color: var(--amber); }
.qty-badge.low::before { content: '⚠'; font-size: 12px; }
.mini-btns {
  display: flex;
  gap: 4px;
}
.mini-btn {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid var(--green-600);
  background: transparent;
  color: var(--text-muted-dark);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
}
.mini-btn:active { background: var(--green-600); color: var(--green-100); }
.mini-btn.del:active { background: rgba(214,64,64,0.2); color: var(--red); border-color: var(--red); }

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--green-500);
}
.empty-state .big { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── BOTTOM SAFE AREA ── */
.page { padding-bottom: max(env(safe-area-inset-bottom, 16px), 16px); }

/* ── LOADING SPINNER ── */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid var(--green-600);
  border-top-color: var(--green-300);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">🌿 Pantry Tracker</div>
        <div class="app-subtitle">Your home food inventory</div>
      </div>
      <button class="header-icon-btn" onclick="exportCSV()" title="Export to CSV">📤</button>
    </div>
    <div class="stats-bar">
      <div class="stat-pill"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total items</div></div>
      <div class="stat-pill"><div class="stat-val" id="s-unique">0</div><div class="stat-lbl">Products</div></div>
      <div class="stat-pill"><div class="stat-val warn" id="s-low">0</div><div class="stat-lbl">Low stock</div></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('scan', this)">
      <span class="tab-icon">📷</span> Scan
    </button>
    <button class="tab" onclick="showTab('inventory', this)">
      <span class="tab-icon">📦</span> Inventory
    </button>
  </div>

  <!-- PAGES -->
  <div class="pages">

    <!-- SCAN PAGE -->
    <div class="page active" id="page-scan">
      <div class="mode-row">
        <button class="mode-btn active" id="mb-add" onclick="setMode('add')">➕ Add to pantry</button>
        <button class="mode-btn" id="mb-rem" onclick="setMode('remove')">➖ Use / remove</button>
      </div>

      <div class="camera-card" id="camera-card" onclick="toggleCamera()">
        <div class="camera-placeholder" id="cam-placeholder">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
            <rect x="6" y="14" width="40" height="30" rx="5" stroke="#72b872" stroke-width="2.5"/>
            <circle cx="26" cy="29" r="8" stroke="#72b872" stroke-width="2.5"/>
            <circle cx="26" cy="29" r="3" fill="#72b872"/>
            <path d="M18 14 L20 8 H32 L34 14" stroke="#72b872" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="40" cy="20" r="2" fill="#72b872"/>
          </svg>
          <p>Tap to open camera</p>
          <p class="hint">Supports UPC, EAN-13, EAN-8, Code128</p>
        </div>
        <div class="scan-overlay" id="scan-overlay" style="display:none">
          <video id="scanner-video" autoplay playsinline muted></video>
          <div class="scan-line"></div>
          <div class="scan-corners">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
          </div>
        </div>
      </div>

      <div class="manual-row">
        <input type="text" class="barcode-input" id="barcode-input"
          placeholder="Or type barcode number…" inputmode="numeric"
          onkeydown="if(event.key==='Enter') lookupBarcode()" />
        <button class="lookup-btn" onclick="lookupBarcode()">Look up</button>
      </div>

      <div class="status" id="status-msg"></div>

      <div class="product-card" id="product-card">
        <div class="product-row">
          <div id="prod-img-wrap"><div class="product-img-ph">🛒</div></div>
          <div style="flex:1; min-width:0;">
            <div class="product-name" id="prod-name">—</div>
            <div class="product-brand" id="prod-brand">—</div>
            <div class="product-barcode" id="prod-barcode">—</div>
          </div>
        </div>
        <div class="action-row">
          <div class="qty-box">
            <button class="qty-step" onclick="adjQty(-1)">−</button>
            <input type="number" class="qty-val" id="qty-val" value="1" min="1" max="99" />
            <button class="qty-step" onclick="adjQty(1)">+</button>
          </div>
          <button class="do-btn add" id="do-btn" onclick="doAction()">Add to pantry</button>
        </div>
      </div>
    </div>

    <!-- INVENTORY PAGE -->
    <div class="page" id="page-inventory">
      <div class="inv-toolbar">
        <input type="search" class="inv-search" id="inv-search"
          placeholder="Search products…" oninput="renderInv()" />
      </div>
      <div class="filter-wrap">
        <button class="fp active" onclick="setFilter('all',this)">All</button>
        <button class="fp" onclick="setFilter('low',this)">⚠ Low stock</button>
        <button class="fp" onclick="setFilter('fresh',this)">Plenty</button>
      </div>
      <div class="sort-row">
        <span class="sort-lbl">Sort:</span>
        <select class="sort-sel" id="sort-sel" onchange="renderInv()">
          <option value="name">Name A–Z</option>
          <option value="qty-asc">Qty low–high</option>
          <option value="qty-desc">Qty high–low</option>
          <option value="newest">Recently added</option>
        </select>
      </div>
      <div class="inv-list" id="inv-list"></div>
    </div>

  </div><!-- /pages -->
</div><!-- /app -->

<script>
// ── STATE ──────────────────────────────────────────────────────
let inventory = [];
let mode = 'add';
let currentProduct = null;
let cameraStream = null;
let scanInterval = null;
let activeFilter = 'all';

try { inventory = JSON.parse(localStorage.getItem('pantry-v2') || '[]'); } catch(e) {}

function save() {
  try { localStorage.setItem('pantry-v2', JSON.stringify(inventory)); } catch(e) {}
}

// ── TABS ──────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'inventory') renderInv();
}

// ── MODE ──────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('mb-add').classList.toggle('active', m === 'add');
  document.getElementById('mb-rem').classList.toggle('active', m === 'remove');
  const btn = document.getElementById('do-btn');
  btn.textContent = m === 'add' ? 'Add to pantry' : 'Remove from pantry';
  btn.className = 'do-btn ' + (m === 'add' ? 'add' : 'remove');
  clearProduct();
}

// ── STATUS ────────────────────────────────────────────────────
let statusTimer = null;
function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.innerHTML = msg;
  el.className = 'status show ' + type;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { el.className = 'status'; }, 4000);
}

// ── QTY ───────────────────────────────────────────────────────
function adjQty(d) {
  const el = document.getElementById('qty-val');
  el.value = Math.max(1, Math.min(99, (parseInt(el.value) || 1) + d));
}

// ── CAMERA ────────────────────────────────────────────────────
async function toggleCamera() {
  if (cameraStream) { stopCamera(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    cameraStream = stream;
    const video = document.getElementById('scanner-video');
    video.srcObject = stream;
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('scan-overlay').style.display = 'block';
    document.getElementById('camera-card').classList.add('active');
    startDetection(video);
  } catch(e) {
    showStatus('📵 Camera access denied — please allow camera permission and try again.', 'error');
  }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  clearInterval(scanInterval); scanInterval = null;
  document.getElementById('cam-placeholder').style.display = '';
  document.getElementById('scan-overlay').style.display = 'none';
  document.getElementById('camera-card').classList.remove('active');
}

function startDetection(video) {
  if (!('BarcodeDetector' in window)) {
    showStatus('ℹ️ Live barcode scanning not supported in this browser — please type the barcode number manually.', 'info');
    return;
  }
  const detector = new BarcodeDetector({
    formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf','codabar']
  });
  let lastCode = null, lastTime = 0;
  scanInterval = setInterval(async () => {
    if (video.readyState < 2) return;
    try {
      const codes = await detector.detect(video);
      if (!codes.length) return;
      const code = codes[0].rawValue;
      const now = Date.now();
      if (code === lastCode && now - lastTime < 3000) return;
      lastCode = code; lastTime = now;
      stopCamera();
      document.getElementById('barcode-input').value = code;
      lookupBarcode();
    } catch(e) {}
  }, 350);
}

// ── LOOKUP ────────────────────────────────────────────────────
async function lookupBarcode() {
  const code = document.getElementById('barcode-input').value.trim().replace(/\D/g,'');
  if (!code) { showStatus('⚠️ Please enter a barcode number.', 'error'); return; }
  clearProduct();
  showStatus('<span class="spinner"></span> Looking up barcode ' + code + '…', 'info');
  try {
    const res = await fetch('https://world.openfoodfacts.org/api/v0/product/' + encodeURIComponent(code) + '.json');
    const data = await res.json();
    if (data.status === 1 && data.product) {
      const p = data.product;
      currentProduct = {
        barcode: code,
        name: (p.product_name || p.product_name_en || p.abbreviated_product_name || 'Unknown product').trim(),
        brand: (p.brands || '').split(',')[0].trim(),
        image: p.image_small_url || p.image_front_small_url || p.image_url || '',
        category: p.categories_tags ? p.categories_tags[0].replace('en:','').replace(/-/g,' ') : ''
      };
      showProduct();
      document.getElementById('status-msg').className = 'status';
    } else {
      showStatus('❌ Product not found in database. Check the barcode or try a different one.', 'error');
    }
  } catch(e) {
    showStatus('🌐 Could not reach product database. Check your internet connection.', 'error');
  }
}

function showProduct() {
  const p = currentProduct;
  document.getElementById('prod-name').textContent = p.name;
  document.getElementById('prod-brand').textContent = p.brand || 'Unknown brand';
  document.getElementById('prod-barcode').textContent = 'Barcode: ' + p.barcode;
  const wrap = document.getElementById('prod-img-wrap');
  if (p.image) {
    wrap.innerHTML = '<img src="' + p.image + '" class="product-img" alt="' + p.name + '" onerror="this.outerHTML=\'<div class=product-img-ph>🛒</div>\'" />';
  } else {
    wrap.innerHTML = '<div class="product-img-ph">🛒</div>';
  }
  document.getElementById('product-card').classList.add('show');
  document.getElementById('qty-val').value = 1;
}

function clearProduct() {
  currentProduct = null;
  document.getElementById('product-card').classList.remove('show');
}

// ── ACTION ────────────────────────────────────────────────────
function doAction() {
  if (!currentProduct) return;
  const qty = parseInt(document.getElementById('qty-val').value) || 1;
  const idx = inventory.findIndex(i => i.barcode === currentProduct.barcode);
  if (mode === 'add') {
    if (idx >= 0) {
      inventory[idx].qty += qty;
      showStatus('✅ Updated: ' + currentProduct.name + ' (+' + qty + ') — now ' + inventory[idx].qty + ' in stock.', 'success');
    } else {
      inventory.push({ ...currentProduct, qty, added: Date.now() });
      showStatus('✅ Added: ' + currentProduct.name + ' ×' + qty, 'success');
    }
  } else {
    if (idx < 0) { showStatus('⚠️ This item is not in your inventory.', 'error'); return; }
    inventory[idx].qty -= qty;
    if (inventory[idx].qty <= 0) {
      const name = inventory[idx].name;
      inventory.splice(idx, 1);
      showStatus('🗑️ Removed: ' + name + ' (all used up)', 'success');
    } else {
      showStatus('✅ Used ' + qty + '× ' + currentProduct.name + ' — ' + inventory[idx].qty + ' remaining.', 'success');
    }
  }
  save(); updateStats(); clearProduct();
  document.getElementById('barcode-input').value = '';
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  const total = inventory.reduce((s,i) => s + i.qty, 0);
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-unique').textContent = inventory.length;
  document.getElementById('s-low').textContent = inventory.filter(i => i.qty <= 2).length;
}

// ── INVENTORY RENDER ──────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fp').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInv();
}

function renderInv() {
  const q = (document.getElementById('inv-search').value || '').toLowerCase();
  const sort = document.getElementById('sort-sel').value;
  let items = inventory.filter(i => {
    const match = !q || i.name.toLowerCase().includes(q) || (i.brand||'').toLowerCase().includes(q);
    if (!match) return false;
    if (activeFilter === 'low' && i.qty > 2) return false;
    if (activeFilter === 'fresh' && i.qty <= 2) return false;
    return true;
  });
  items.sort((a,b) => {
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'qty-asc') return a.qty - b.qty;
    if (sort === 'qty-desc') return b.qty - a.qty;
    if (sort === 'newest') return b.added - a.added;
    return 0;
  });
  const list = document.getElementById('inv-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">' +
      (inventory.length ? '🔍' : '📭') + '</div><p>' +
      (inventory.length ? 'No items match your search or filter.' : 'Your pantry is empty.<br>Go to Scan to add items!') +
      '</p></div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const realIdx = inventory.indexOf(item);
    const low = item.qty <= 2;
    const img = item.image
      ? `<img src="${item.image}" class="inv-thumb" alt="${item.name}" onerror="this.outerHTML='<div class=inv-thumb-ph>🛒</div>'" />`
      : `<div class="inv-thumb-ph">🛒</div>`;
    return `<div class="inv-item">
      ${img}
      <div class="inv-body">
        <div class="inv-name">${item.name}</div>
        <div class="inv-meta">${item.brand || 'Unknown brand'}${item.category ? ' · ' + item.category : ''}</div>
      </div>
      <div class="inv-right">
        <div class="qty-badge${low?' low':''}">×${item.qty}</div>
        <div class="mini-btns">
          <button class="mini-btn" onclick="nudge(${realIdx},-1)" title="Use one">−</button>
          <button class="mini-btn" onclick="nudge(${realIdx},1)" title="Add one">+</button>
          <button class="mini-btn del" onclick="removeAll(${realIdx})" title="Delete">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function nudge(idx, delta) {
  inventory[idx].qty = Math.max(0, inventory[idx].qty + delta);
  if (inventory[idx].qty === 0) inventory.splice(idx, 1);
  save(); updateStats(); renderInv();
}

function removeAll(idx) {
  const name = inventory[idx].name;
  inventory.splice(idx, 1);
  save(); updateStats(); renderInv();
}

// ── EXPORT ────────────────────────────────────────────────────
function exportCSV() {
  if (!inventory.length) { alert('No items to export yet.'); return; }
  const rows = [['Name','Brand','Barcode','Quantity','Category','Added']];
  inventory.forEach(i => {
    rows.push([
      '"' + (i.name||'').replace(/"/g,'""') + '"',
      '"' + (i.brand||'').replace(/"/g,'""') + '"',
      i.barcode || '',
      i.qty,
      '"' + (i.category||'').replace(/"/g,'""') + '"',
      i.added ? new Date(i.added).toLocaleDateString() : ''
    ]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'pantry-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── INIT ──────────────────────────────────────────────────────
updateStats();
renderInv();
</script>
